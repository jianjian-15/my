<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git存储留言板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        .title {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .msg-publish {
            margin-bottom: 30px;
        }
        .msg-textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            outline: none;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .publish-btn {
            padding: 8px 25px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            float: right;
        }
        .publish-btn:hover {
            background: #27ae60;
        }
        .msg-list {
            clear: both;
            margin-top: 20px;
        }
        .msg-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
        .msg-time {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .msg-content {
            color: #333;
            line-height: 1.6;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Git云端留言板</h1>
        <div class="msg-publish">
            <textarea class="msg-textarea" id="msgContent" placeholder="直接留言，数据保存在Git仓库中..."></textarea>
            <button class="publish-btn" id="sendMsgBtn">发布留言</button>
        </div>
        <div class="msg-list" id="msgList">
            <div class="empty-tip">加载留言中...</div>
        </div>
    </div>

    <script>
        // ========== 请替换这3处信息为你自己的 ==========
        const GITHUB_USER = "你的GitHub用户名";
        const GITHUB_REPO = "你的仓库名称";
        const GITHUB_TOKEN = "你的GitHub个人访问令牌";
        // ==============================================

        const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues`;
        const msgContentEl = document.getElementById("msgContent");
        const msgListEl = document.getElementById("msgList");
        const sendMsgBtnEl = document.getElementById("sendMsgBtn");

        // 页面加载时获取Git仓库中的留言
        window.onload = loadMessages;

        // 从GitHub Issues读取留言（Git存储的数据）
        async function loadMessages() {
            try {
                const res = await fetch(apiUrl, {
                    headers: { Authorization: `token ${GITHUB_TOKEN}` }
                });
                const issues = await res.json();
                renderMessages(issues);
            } catch (err) {
                msgListEl.innerHTML = `<div class="empty-tip">留言加载失败，请检查配置</div>`;
            }
        }

        // 发布留言到Git仓库（创建GitHub Issue）
        sendMsgBtnEl.onclick = async function () {
            const content = msgContentEl.value.trim();
            if (!content) {
                alert("留言内容不能为空！");
                return;
            }
            try {
                await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        Authorization: `token ${GITHUB_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        title: `留言 ${new Date().toLocaleString()}`,
                        body: content
                    })
                });
                msgContentEl.value = "";
                loadMessages();
                alert("留言发布成功，已保存到Git仓库！");
            } catch (err) {
                alert("留言发布失败");
            }
        };

        // 渲染留言列表
        function renderMessages(issues) {
            if (issues.length === 0) {
                msgListEl.innerHTML = `<div class="empty-tip">暂无留言，快来写下第一条吧~</div>`;
                return;
            }
            let html = "";
            issues.forEach(issue => {
                html += `
                    <div class="msg-item">
                        <div class="msg-time">${new Date(issue.created_at).toLocaleString()}</div>
                        <div class="msg-content">${issue.body}</div>
                    </div>
                `;
            });
            msgListEl.innerHTML = html;
        }
    </script>
</body>
</html>
