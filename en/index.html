<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公共留言板</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@waline/client@3/dist/waline.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 20px;
    }
    .container {
      max-width: 740px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }
    .title {
      text-align: center;
      font-size: 26px;
      margin-bottom: 8px;
      color: #222;
    }
    .tip {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 15px;
    }
    #waline {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">公共留言板</div>
    <div class="tip">填写昵称和内容，点击右下角发表按钮即可留言</div>
    <div id="waline"></div>
  </div>

  <script type="module">
    import { init } from 'https://cdn.jsdelivr.net/npm/@waline/client@3/dist/waline.mjs'
    init({
      el: '#waline',
      serverURL: 'https://my-five-lemon.vercel.app',
      lang: 'zh-CN',
      login: 'disable',
      requiredMeta: ['nick'],
      placeholder: '请输入留言内容...',
      // 强制默认展开评论框，直接显示发表按钮
      pageview: true,
      comment: true
    })
  </script>
</body>
</html>
