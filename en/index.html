<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>公共留言板（可回复评论）</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@waline/client@3/dist/waline.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }
        .title {
            text-align: center;
            font-size: 26px;
            color: #333;
            margin-bottom: 10px;
        }
        .desc {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        #waline {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">公共留言板</h1>
        <p class="desc">无需登录，可直接留言、回复他人评论</p>
        <div id="waline"></div>
    </div>

    <script type="module">
        import { init } from 'https://cdn.jsdelivr.net/npm/@waline/client@3/dist/waline.mjs'
        init({
            el: '#waline',
            // 已帮你填好你的 Vercel 域名
            serverURL: 'https://my-five-lemon.vercel.app',
            lang: 'zh-CN',
            requiredMeta: ['nick'],
            login: 'disable',
            placeholder: '写下你的留言...'
        })
    </script>
</body>
</html>
