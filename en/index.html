<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简易留言板 | 可直接留言、可回复</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@waline/client@3/dist/waline.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    }

    body {
      background: #f6f7f9;
      padding: 20px;
    }

    .container {
      max-width: 740px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .title {
      font-size: 26px;
      font-weight: 600;
      text-align: center;
      color: #222;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 15px;
      margin-bottom: 32px;
    }

    #waline {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">公共留言板</div>
    <div class="subtitle">无需登录，可直接留言、可回复他人评论</div>
    <div id="waline"></div>
  </div>

  <script type="module">
    import { init } from 'https://cdn.jsdelivr.net/npm/@waline/client@3/dist/waline.mjs'
    init({
      el: '#waline',
      serverURL: 'https://my-five-lemon.vercel.app',
      lang: 'zh-CN',
      login: 'disable',
      requiredMeta: ['nick'],
      placeholder: '写下你的留言...',
    })
  </script>
</body>
</html>
