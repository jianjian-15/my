<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共云端留言板</title>
    <!-- 引入Gitalk样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        .title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 26px;
        }
        .desc {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        /* Gitalk留言区样式 */
        #gitalk-container {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">公共留言板</h1>
        <!-- Gitalk留言挂载区域 -->
        <div id="gitalk-container"></div>
    </div>

    <!-- 引入Gitalk脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js"></script>
    <script>
        // ========== 仅需修改这4处信息 ==========
        const clientID = "Ov23lisVGIcmPC9mMy3U";
        const clientSecret = "3b2c64c85c974a0a773b53a34ee8ae863c3c3570";
        const repo = "my";
        const owner = "jianjian-15";
        // ======================================

        // 初始化Gitalk留言插件
        const gitalk = new Gitalk({
            clientID: clientID,
            clientSecret: clientSecret,
            repo: repo,
            owner: owner,
            admin: [owner],
            id: location.pathname,
            distractionFreeMode: false
        });
        gitalk.render('gitalk-container');
    </script>
</body>
</html>
