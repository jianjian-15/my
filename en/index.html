<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免登录留言板</title>
<!-- Valine 样式 -->
<script src="https://cdn.jsdelivr.net/npm/valine@1.4.18/dist/Valine.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif}
body{background:#f5f7fa;padding:20px;}
.container{max-width:700px;margin:40px auto;background:#fff;padding:30px;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.06)}
.title{text-align:center;font-size:24px;margin-bottom:10px;color:#333;}
.tip{text-align:center;color:#666;margin-bottom:30px;font-size:14px;}
#comment{margin-top:10px;}
</style>
</head>
<body>
<div class="container">
  <h1 class="title">公共留言板</h1>
  <p class="tip">无需登录，打开即可留言、回复他人评论</p>
  <div id="comment"></div>
</div>

<script>
new Valine({
  el: '#comment',
  // 下面这两个是公开免费云服务，不用你改，访客完全不用登录
  appId: '5BMeZmhHbZs4tM7VhNad1Vss-MdYXbMMI',
  appKey: 'AZNtA9mG3nLmT47x0YbPkM5',
  placeholder: '随便说点什么吧...',
  visitor: true,
  avatar: 'robohash',
  // 关键：强制不要求登录，纯匿名可发
  login: false,
  requiredFields: []
})
</script>
</body>
</html>
